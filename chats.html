<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <title>ChatFun</title>
</head>

<body class="bg-blue-900 min-h-screen text-white">

    <header>
        <!-- Cabeçalho -->
    </header>

    <main class="p-5">

        <!-- USUÁRIO LOGADO -->
        <div class="bg-red-800 p-3 rounded-xl mb-5 text-center">

            Hi!

            <span id="usuarioLogado"></span>

        </div>

        <!-- ÁREA PRINCIPAL -->
        <div class="flex flex-col lg:flex-row gap-5">

            <!-- MENU -->
            <aside class="bg-blue-400 border-3 border-black rounded-xl p-4 w-full lg:w-1/4">

                <h2 class="text-black text-2xl font-bold text-center mb-4">
                    Conversas
                </h2>

                <!-- CHAT 1 -->
                <button
                    onclick="trocarChat('chat1')"

                    class="w-full bg-black hover:bg-green-600 transition rounded-lg p-3 mb-3 cursor-pointer">

                    Joao

                </button>

                <!-- CHAT 2 -->
                <button
                    onclick="trocarChat('chat2')"

                    class="w-full bg-black hover:bg-green-600 transition rounded-lg p-3 cursor-pointer">

                    Maria

                </button>

            </aside>

            <!-- CHAT -->
            <section class="bg-blue-400 border-3 border-white rounded-xl p-4 flex-1 flex flex-col">

                <!-- TÍTULO -->
                <h2 id="tituloChat"
                    class="text-black text-2xl font-bold text-center mb-4">

                    Joao

                </h2>

                <!-- MENSAGENS -->
                <div id="mensagens"
                    class="bg-blue-950 rounded-xl p-4 h-[500px] overflow-y-auto mb-4 space-y-3">

                </div>

                <!-- ENVIAR -->
                <div class="flex gap-3">

                    <input
                        type="text"

                        id="mensagemInput"

                        placeholder="Digite sua mensagem..."

                        class="flex-1 p-3 rounded-lg bg-white text-black focus:border-1 transition">

                    <button
                        onclick="enviarMensagem()"

                        class="bg-green-500 hover:bg-green-700 transition rounded-lg px-5 hover:scale-100 hover:bg-blue-700 hover:text-black hover:scale-120 cursor-pointer">

                        Enviar

                    </button>

                </div>

            </section>

        </div>

    </main>

    <footer>

    </footer>

    <!-- JS DO CHAT -->
    <script src="js/chats.js"></script>

</body>

</html>
